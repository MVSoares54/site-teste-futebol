<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcos – Fotografia de Futebol</title>

  <!-- Fontes Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ícones Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    /* =========
       PALETA: PRETO · VERMELHO · BRANCO
       ========= */
    :root {
      --cor-fundo:        #080808;
      --cor-fundo-card:   #111111;
      --cor-fundo-alt:    #0f0f0f;
      --cor-texto:        #f5f5f5;
      --cor-texto-sec:    #aaaaaa;
      --cor-borda:        #ffffff18;
      --cor-destaque:     #e02020;   /* vermelho principal */
      --cor-destaque-2:   #ff4444;   /* vermelho mais claro (hover) */
      --cor-sucesso:      #25d366;   /* verde WhatsApp */
      --cor-header:       rgba(8,8,8,0.97);
      --cor-footer:       #060606;

      --fonte-titulo:     'Oswald', sans-serif;
      --fonte-texto:      'Inter',  sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    /* RESET */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--fonte-texto);
      background: var(--cor-fundo);
      color: var(--cor-texto);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* TIPOGRAFIA */
    h1, h2, h3 {
      font-family: var(--fonte-titulo);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 { font-size: 2.4rem; font-weight: 700; line-height: 1.1; }
    h2 { font-size: 2rem;   font-weight: 600; line-height: 1.2; }
    h3 { font-size: 1.3rem; font-weight: 600; line-height: 1.3; }

    p {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--cor-texto-sec);
    }

    .texto-pequeno {
      font-size: 0.85rem;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      h1 { font-size: 1.8rem; }
      h2 { font-size: 1.6rem; }
      h3 { font-size: 1.2rem; }
      p  { font-size: 0.95rem; }
    }

    /* =========
       HEADER + MENU
       ========= */
    header {
      background: var(--cor-header);
      border-bottom: 1px solid var(--cor-borda);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    /* LOGO COM FOTO DE PERFIL */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      white-space: nowrap;
    }

    .logo-foto {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 2px solid var(--cor-destaque);
      object-fit: cover;
      display: block;
      /* fallback se a foto ainda não estiver no repositório */
      background: #222;
    }

    /* Ícone de fallback (aparece se não tiver a foto) */
    .logo-foto-fallback {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 2px solid var(--cor-destaque);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      color: var(--cor-destaque);
      background: #1a1a1a;
    }

    .logo-text {
      font-family: var(--fonte-titulo);
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-links a {
      color: var(--cor-texto-sec);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      position: relative;
      padding-bottom: 0.2rem;
      transition: color 0.2s;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      background: var(--cor-destaque);
      transition: width 0.25s ease;
    }

    .nav-links a:hover {
      color: #fff;
    }

    .nav-links a:hover::after,
    .nav-links a.ativo::after {
      width: 100%;
    }

    .nav-links a.ativo {
      color: var(--cor-texto);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--cor-sucesso);
      color: var(--cor-sucesso);
      transition: background 0.2s;
    }

    .nav-cta:hover {
      background: #25d36618;
    }

    .nav-cta i {
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }

      nav {
        width: 100%;
        justify-content: space-between;
      }

      .nav-links {
        gap: 0.75rem;
      }

      .nav-links a {
        font-size: 0.75rem;
      }

      .nav-cta {
        padding: 0.35rem 0.75rem;
        font-size: 0.72rem;
      }
    }

    /* =========
       MAIN
       ========= */
    main {
      flex: 1;
    }

    /* =========
       HERO
       ========= */
    .hero-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem 2rem;
    }

    .hero-container {
      max-width: 900px;
      width: 100%;
      background: var(--cor-fundo-card);
      border-radius: 14px;
      border: 1px solid var(--cor-borda);
      padding: 2.8rem 2.4rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 2rem;
      align-items: center;
    }

    @media (max-width: 800px) {
      .hero-container {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 1.8rem 1.4rem;
      }
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--cor-destaque);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .hero-kicker i {
      font-size: 0.85rem;
    }

    .hero-title {
      margin-bottom: 0.8rem;
    }

    .hero-highlight {
      color: var(--cor-destaque);
    }

    .hero-subtitle {
      font-size: 0.95rem;
      color: var(--cor-texto-sec);
      margin-bottom: 1.5rem;
      max-width: 480px;
    }

    @media (max-width: 800px) {
      .hero-subtitle {
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
      }
    }

    .hero-beneficios {
      list-style: none;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-bottom: 1.8rem;
    }

    .hero-beneficios li {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.93rem;
      color: var(--cor-texto-sec);
    }

    .hero-beneficios i {
      color: var(--cor-destaque);
      margin-top: 0.18rem;
      font-size: 0.85rem;
    }

    @media (max-width: 800px) {
      .hero-beneficios {
        text-align: left;
        max-width: 340px;
        margin-left: auto;
        margin-right: auto;
      }
    }

    /* Painel lateral do hero */
    .hero-lateral {
      border-radius: 12px;
      border: 1px solid var(--cor-destaque)44;
      padding: 1.6rem 1.3rem;
      background: linear-gradient(135deg, #1a0808 0%, #110000 100%);
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .hero-lateral-titulo {
      font-family: var(--fonte-titulo);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--cor-destaque);
    }

    .hero-lateral p {
      font-size: 0.88rem;
      line-height: 1.65;
    }

    .hero-lateral-stat {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .hero-lateral-stat-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--cor-texto-sec);
    }

    .hero-lateral-stat-item i {
      color: var(--cor-destaque);
      font-size: 0.9rem;
      width: 16px;
      text-align: center;
    }

    /* =========
       BOTÕES
       ========= */
    .botoes-acao {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: flex-start;
    }

    @media (max-width: 800px) {
      .botoes-acao {
        justify-content: center;
      }
    }

    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.8rem;
      border-radius: 999px;
      background: var(--cor-sucesso);
      color: #ffffff;
      font-family: var(--fonte-texto);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 6px 20px rgba(37,211,102,0.25);
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-whatsapp i {
      font-size: 1.05rem;
    }

    .btn-whatsapp:hover {
      background: #2fe077;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(37,211,102,0.35);
    }

    .btn-primario {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.8rem;
      border-radius: 999px;
      background: var(--cor-destaque);
      color: #ffffff;
      font-family: var(--fonte-texto);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 6px 20px rgba(224,32,32,0.3);
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primario:hover {
      background: var(--cor-destaque-2);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(224,32,32,0.4);
    }

    .btn-secundario {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem 1.6rem;
      border-radius: 999px;
      background: transparent;
      color: var(--cor-texto);
      font-family: var(--fonte-texto);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      border: 1px solid var(--cor-borda);
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-secundario i {
      font-size: 1rem;
    }

    .btn-secundario:hover {
      border-color: var(--cor-destaque);
      color: var(--cor-destaque);
      background: #e0202008;
      transform: translateY(-1px);
    }

    /* =========
       DIVISOR DE SEÇÃO
       ========= */
    .secao-divider {
      width: 48px;
      height: 3px;
      background: var(--cor-destaque);
      border-radius: 999px;
      margin: 0 auto 1.2rem;
    }

    /* =========
       SEÇÃO GENÉRICA
       ========= */
    .secao {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    .secao-cabecalho {
      text-align: center;
      margin-bottom: 2rem;
    }

    .secao-kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--cor-destaque);
      margin-bottom: 0.5rem;
    }

    .secao-titulo {
      font-size: 1.6rem;
      margin-bottom: 0.6rem;
      color: #fff;
    }

    .secao-subtitulo {
      font-size: 0.93rem;
      color: var(--cor-texto-sec);
      max-width: 580px;
      margin: 0 auto;
    }

    /* =========
       COMO FUNCIONA
       ========= */
    .como-funciona-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.4rem;
    }

    @media (max-width: 900px) {
      .como-funciona-grid {
        grid-template-columns: 1fr;
        max-width: 480px;
        margin: 0 auto;
      }
    }

    .como-card {
      background: var(--cor-fundo-card);
      border-radius: 12px;
      border: 1px solid var(--cor-borda);
      border-top: 3px solid var(--cor-destaque);
      padding: 1.4rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: box-shadow 0.2s;
    }

    .como-card:hover {
      box-shadow: 0 10px 28px rgba(224,32,32,0.12);
    }

    .como-etapa {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--cor-texto-sec);
      margin-bottom: 0.2rem;
    }

    .como-etapa-numero {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--cor-destaque);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: #fff;
      font-weight: 700;
    }

    .como-titulo {
      font-size: 1rem;
      color: #fff;
    }

    .como-texto {
      font-size: 0.88rem;
      color: var(--cor-texto-sec);
      line-height: 1.65;
    }

    .como-icons {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      color: var(--cor-destaque);
      display: flex;
      gap: 0.5rem;
    }

    /* =========
       GALERIAS
       ========= */
    .galerias-wrapper {
      background: var(--cor-fundo-alt);
      border-top: 1px solid var(--cor-borda);
      border-bottom: 1px solid var(--cor-borda);
    }

    .galerias {
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem 1.5rem 3.5rem;
    }

    .galerias-filtro {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .filtro-btn {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--cor-borda);
      color: var(--cor-texto-sec);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--fonte-texto);
    }

    .filtro-btn:hover,
    .filtro-btn.ativo {
      border-color: var(--cor-destaque);
      color: var(--cor-destaque);
      background: #e0202010;
    }

    .galerias-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.6rem;
    }

    @media (max-width: 1000px) {
      .galerias-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      .galerias-grid {
        grid-template-columns: 1fr;
      }
    }

    .card-galeria {
      background: var(--cor-fundo-card);
      border-radius: 12px;
      border: 1px solid var(--cor-borda);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .card-galeria:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 32px rgba(224,32,32,0.18);
      border-color: var(--cor-destaque);
    }

    .card-galeria-thumb {
      position: relative;
      height: 155px;
      background: linear-gradient(135deg, #1a0808 0%, #0f0f0f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff22;
      font-size: 2.6rem;
    }

    .card-galeria-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--cor-destaque);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.22rem 0.65rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-galeria-tipo {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #ffffff15;
      color: #fff;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      backdrop-filter: blur(4px);
    }

    .card-galeria-body {
      padding: 1rem 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      flex: 1;
    }

    .card-galeria-titulo {
      font-size: 0.95rem;
      color: #fff;
      line-height: 1.35;
    }

    .card-galeria-info {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      font-size: 0.82rem;
      color: var(--cor-texto-sec);
    }

    .card-galeria-info-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .card-galeria-info-item i {
      font-size: 0.85rem;
      color: var(--cor-destaque);
    }

    .card-galeria-rodape {
      margin-top: 0.7rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--cor-texto-sec);
      border-top: 1px solid var(--cor-borda);
      padding-top: 0.7rem;
    }

    .card-galeria-link {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--cor-destaque);
      transition: gap 0.2s;
    }

    .card-galeria-link:hover {
      gap: 0.5rem;
    }

    .card-galeria-link i {
      font-size: 0.8rem;
    }

    /* CTA EMBAIXO DAS GALERIAS */
    .galerias-cta {
      text-align: center;
      margin-top: 2.5rem;
      padding: 1.8rem 1.5rem;
      border: 1px dashed var(--cor-borda);
      border-radius: 12px;
      background: #0f0000;
    }

    .galerias-cta p {
      margin-bottom: 1rem;
      font-size: 0.93rem;
    }

    /* =========
       RODAPÉ
       ========= */
    .footer-main {
      border-top: 1px solid var(--cor-borda);
      background: var(--cor-footer);
    }

    .footer-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2.2rem 1.5rem 1.5rem;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr) minmax(0, 1.3fr);
      gap: 2rem;
    }

    @media (max-width: 900px) {
      .footer
